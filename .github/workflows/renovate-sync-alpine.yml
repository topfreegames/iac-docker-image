name: Renovate Sync Alpine DepNames

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - Dockerfile

permissions:
  contents: write
  pull-requests: read

jobs:
  sync-alpine-depnames:
    if: >
      github.event.pull_request.user.login == 'renovate[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'renovate/') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          fetch-depth: 0

      - name: Sync repology depName namespace
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          git fetch origin "${BASE_REF}"

          if git merge-base --is-ancestor "origin/${BASE_REF}" HEAD; then
            DIFF_RANGE="origin/${BASE_REF}...HEAD"
          else
            DIFF_RANGE="origin/${BASE_REF}..HEAD"
          fi

          if ! git diff "${DIFF_RANGE}" -- Dockerfile | grep -q "^[-+]FROM alpine:"; then
            echo "Alpine base not changed; skipping."
            exit 0
          fi

          node renovate-sync-alpine-depnames.js

          if git diff --quiet; then
            echo "No depName updates needed."
            exit 0
          fi

          git config user.name "renovate[bot]"
          git config user.email "29139614+renovate[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "chore: sync repology alpine depName"
          git push
