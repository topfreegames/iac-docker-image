name: Sync Base Image DepNames

on:
  push:
    branches:
      - next-base-image
    paths:
      - Dockerfile

permissions:
  contents: write

jobs:
  sync-alpine-depnames:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sync repology depName namespace
        run: |
          set -euo pipefail
          last_message="$(git log -1 --pretty=%B)"
          if [ "${last_message}" = "chore: sync repology alpine depName" ]; then
            echo "Last commit is sync commit; skipping."
            exit 0
          fi

          node renovate-sync-alpine-depnames.js

          if git diff --quiet; then
            echo "No depName updates needed."
            exit 0
          fi

          git config user.name "renovate[bot]"
          git config user.email "29139614+renovate[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "chore: sync repology alpine depName"
          git push
