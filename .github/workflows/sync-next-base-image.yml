name: Sync next-base-image with master

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  sync-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Force-sync next-base-image to master
        run: |
          set -euo pipefail
          git fetch origin master next-base-image
          git checkout -B next-base-image origin/master
          git push --force-with-lease origin next-base-image
